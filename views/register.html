<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - SkillSwap</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 350px;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      color: #fff;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    .input-box {
      position: relative;
      margin-bottom: 20px;
    }

    .input-box input,
    .input-box select {
      width: 100%;
      padding: 10px;
      border: none;
      outline: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    .input-box input::placeholder {
      color: #eee;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #ff7eb3;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff4f9a;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
    }

    .link a {
      color: #fff;
      text-decoration: underline;
    }

  </style>
</head>
<body>

  <div class="container">
    <h2>Create Account</h2>

    <form id="registerForm">
      
      <div class="input-box">
        <input type="text" name="name" placeholder="Full Name" required>
      </div>

      <div class="input-box">
        <input type="email" name="email" placeholder="Email" required>
      </div>

      <div class="input-box">
        <input type="password" name="password" placeholder="Password" required>
      </div>

      <div class="input-box">
        <select name="role">
          <option value="student">Student</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <button class="btn">Register</button>

    </form>

    <div class="link">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

</body>
</html>
