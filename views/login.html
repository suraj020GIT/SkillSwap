<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: white;
        padding: 30px;
        width: 300px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    .link {
        margin-top: 10px;
        display: block;
    }

    </style>
</head>

<body>

<div class="container">
    <h2>Login </h2>

    <form action="/login" method="POST">
        <input type="email" name="email" placeholder="Enter Email" required>
       <input type="password" id="password" name="password" placeholder="Enter Password" required>
   

        <button type="submit">Login</button>
    </form>

    <a class="link" href="/register">New user? Register</a>
</div>


</body>
</html>
